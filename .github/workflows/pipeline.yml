name: Tourism Wellness Package pipeline

on:
  push:
    branches:
      - main  # Automatically triggers on push to the main branch

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  register-dataset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: pip install -r AIML_MLOPS_TourismPkgPurchasePrediction/requirements.txt
      - name: Upload Dataset to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python AIML_MLOPS_TourismPkgPurchasePrediction/model_building/data_register.py

  data-prep:
    needs: register-dataset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: pip install -r AIML_MLOPS_TourismPkgPurchasePrediction/requirements.txt
      - name: Run Data Preparation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python AIML_MLOPS_TourismPkgPurchasePrediction/model_building/prep.py

  model-traning:
    needs: data-prep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: pip install -r AIML_MLOPS_TourismPkgPurchasePrediction/requirements.txt
      - name: Start MLflow Server
        run: |
          nohup mlflow ui --host 0.0.0.0 --port 5000 &
          sleep 5
      - name: Model Building
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python AIML_MLOPS_TourismPkgPurchasePrediction/model_building/train.py

  deploy-hosting:
    runs-on: ubuntu-latest
    needs: [model-traning, data-prep, register-dataset]
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: pip install -r AIML_MLOPS_TourismPkgPurchasePrediction/requirements.txt
      - name: Push files to Frontend Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python AIML_MLOPS_TourismPkgPurchasePrediction/hosting/hosting.py
